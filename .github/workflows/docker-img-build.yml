name: GEMd Docker Build and Push

on:
  push:
    branches: [ "main", "devel" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "devel" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push gem-base image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          target: gem-base
          tags: |
            ghcr.io/generalpepperoni/gemd-slim:latest
            ghcr.io/generalpepperoni/gemd-slim:${{ steps.sha.outputs.short_sha }}
          push: ${{ github.event_name != 'pull_request' }}

      - name: Build and push gem-desktop image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          target: gem-desktop
          tags: |
            ghcr.io/generalpepperoni/gemd-full:latest
            ghcr.io/generalpepperoni/gemd-full:${{ steps.sha.outputs.short_sha }}
          push: ${{ github.event_name != 'pull_request' }}
